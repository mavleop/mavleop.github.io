async function fetchComments() {
  commentsContainer.innerHTML = "Loading comments...";

  const listRes = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/comments`
  );

  const files = await listRes.json();

  if (!Array.isArray(files)) {
    commentsContainer.innerHTML = "Failed to load comments";
    return;
  }

  const comments = await Promise.all(
    files.map(async file => {
      const res = await fetch(file.download_url);
      return res.json();
    })
  );

  comments.sort((a, b) => new Date(a.created) - new Date(b.created));

  commentsContainer.innerHTML = "";

  comments.forEach(c => {
    const div = document.createElement("div");
    div.className = "comment";
    div.innerHTML = `<strong>${c.user}</strong>: ${c.body}`;
    commentsContainer.appendChild(div);
  });
}

// Helper to submit a new comment (creates an issue)
async function submitComment() {
  const content = commentInput.value.trim();
  if (!content) return alert('Comment cannot be empty');

  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues`, {
    method: 'POST',
    headers: {
      Authorization: `token ${TOKEN}`,
      Accept: 'application/vnd.github+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      title: `Comment:${POST_ID}`,
      body: content,
      labels: [LABEL]
    })
  });

  if (res.ok) {
    commentInput.value = '';
    fetchComments(); // refresh
  } else {
    const err = await res.json();
    alert('Failed to submit comment: ' + (err.message || res.status));
  }
}

submitBtn.addEventListener('click', submitComment);
fetchComments();
</script>
